  <text x="765" y="350" fill="#6b7280" font-size="8" text-anchor="middle">330Ω em série</text>

  <circle cx="715" cy="370" r="7" fill="#00ff00" opacity="0.8"/>
  <text x="727" y="374" fill="#00ff88" font-size="8">Verde   GPIO19 CAN</text>
