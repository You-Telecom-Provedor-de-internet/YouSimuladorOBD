  <line x1="340" y1="121" x2="360" y2="121" stroke="#e0e6f0" stroke-width="1"/>

  <!-- ESP32 → L9637D wires -->
  <line x1="580" y1="189" x2="600" y2="189" stroke="#e0e6f0" stroke-width="1"/>
  <line x1="600" y1="189" x2="600" y2="268" stroke="#e0e6f0" stroke-width="1"/>
  <line x1="340" y1="268" x2="600" y2="268" stroke="#e0e6f0" stroke-width="1"/>
