  <line x1="610" y1="204" x2="610" y2="281" stroke="#e0e6f0" stroke-width="1"/>
  <line x1="340" y1="281" x2="610" y2="281" stroke="#e0e6f0" stroke-width="1"/>

  <!-- ════════════════════════════════════════
       OLED SSD1306 (right-top)
  ════════════════════════════════════════ -->
