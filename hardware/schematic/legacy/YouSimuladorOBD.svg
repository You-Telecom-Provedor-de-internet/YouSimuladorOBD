<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" width="1100" height="900" style="background:#0f1117;font-family:'Segoe UI',monospace">

  <!-- ═══ TITLE ═══ -->
  <text x="550" y="28" fill="#00d4ff" font-size="16" font-weight="bold" text-anchor="middle">YouSimuladorOBD — Diagrama Elétrico Completo</text>
  <text x="550" y="46" fill="#6b7280" font-size="10" text-anchor="middle">ESP32 38-pin · SN65HVD230 · L9637D · LM2596 · SSD1306 · KY-040</text>

  <!-- ════════════════════════════════════════
       OBD-II CONNECTOR (left)
  ════════════════════════════════════════ -->
  <rect x="20" y="60" width="110" height="180" rx="6" fill="#1a1d27" stroke="#3a3d4a" stroke-width="1.5"/>
  <text x="75" y="78" fill="#00d4ff" font-size="9" font-weight="bold" text-anchor="middle">OBD-II J1962</text>

  <circle cx="35" cy="95"  r="4" fill="#6b7280"/>  <text x="45" y="99"  fill="#e0e6f0" font-size="8">Pin 4  GND</text>
  <circle cx="35" cy="113" r="4" fill="#6b7280"/>  <text x="45" y="117" fill="#e0e6f0" font-size="8">Pin 5  GND sig.</text>
  <circle cx="35" cy="131" r="4" fill="#00ff88"/>  <text x="45" y="135" fill="#00ff88" font-size="8">Pin 6  CANH</text>
  <circle cx="35" cy="149" r="4" fill="#00d4ff"/>  <text x="45" y="153" fill="#00d4ff" font-size="8">Pin 7  K-Line</text>
  <circle cx="35" cy="167" r="4" fill="#ff4466"/>  <text x="45" y="171" fill="#ff4466" font-size="8">Pin 14 CANL</text>
  <circle cx="35" cy="185" r="4" fill="#ffd700"/>  <text x="45" y="189" fill="#ffd700" font-size="8">Pin 16 +12V</text>

  <!-- ════════════════════════════════════════
       LM2596 STEP-DOWN (left-center)
  ════════════════════════════════════════ -->
  <rect x="20" y="270" width="110" height="80" rx="6" fill="#1a1d27" stroke="#ffd700" stroke-width="1.5"/>
  <text x="75" y="288" fill="#ffd700" font-size="9" font-weight="bold" text-anchor="middle">LM2596</text>
  <text x="75" y="300" fill="#6b7280" font-size="8" text-anchor="middle">12V → 5V</text>
  <text x="30" y="318" fill="#e0e6f0" font-size="8">IN+  OUT+</text>
  <text x="30" y="332" fill="#e0e6f0" font-size="8">IN−  OUT−</text>
  <text x="75" y="346" fill="#6b7280" font-size="7" text-anchor="middle">⚠ ajustar para 5.0V</text>

  <!-- LM2596 wires from OBD -->
  <line x1="35" y1="185" x2="35" y2="278" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="35" y1="95"  x2="20" y2="95"  stroke="#6b7280" stroke-width="1"/>
  <line x1="20" y1="95"  x2="20" y2="335" stroke="#6b7280" stroke-width="1"/>
  <line x1="20" y1="335" x2="20" y2="335" stroke="#6b7280" stroke-width="1"/>

  <!-- ════════════════════════════════════════
       SN65HVD230 (top-center)
  ════════════════════════════════════════ -->
  <rect x="210" y="60" width="130" height="130" rx="6" fill="#1a1d27" stroke="#00ff88" stroke-width="1.5"/>
  <text x="275" y="78" fill="#00ff88" font-size="9" font-weight="bold" text-anchor="middle">SN65HVD230</text>
  <text x="275" y="90" fill="#6b7280" font-size="8" text-anchor="middle">CAN Transceiver 3.3V</text>

  <text x="220" y="108" fill="#e0e6f0" font-size="8">D/TXD ← GPIO4</text>
  <text x="220" y="121" fill="#e0e6f0" font-size="8">R/RXD → GPIO5</text>
  <text x="220" y="134" fill="#ff4466" font-size="8">VCC  ← 3V3</text>
  <text x="220" y="147" fill="#6b7280" font-size="8">GND  ← GND</text>
  <text x="220" y="160" fill="#00ff88" font-size="8">CANH → OBD Pin6</text>
  <text x="220" y="173" fill="#ff4466" font-size="8">CANL → OBD Pin14</text>
  <text x="220" y="186" fill="#6b7280" font-size="8">RS   → GND</text>

  <!-- OBD CANH wire to SN65HVD230 -->
  <line x1="35" y1="131" x2="130" y2="131" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="130" y1="131" x2="130" y2="165" stroke="#00ff88" stroke-width="1.5"/>
  <line x1="130" y1="165" x2="210" y2="165" stroke="#00ff88" stroke-width="1.5"/>
  <!-- OBD CANL wire to SN65HVD230 -->
  <line x1="35" y1="167" x2="120" y2="167" stroke="#ff4466" stroke-width="1.5"/>
  <line x1="120" y1="167" x2="120" y2="175" stroke="#ff4466" stroke-width="1.5"/>
  <line x1="120" y1="175" x2="210" y2="175" stroke="#ff4466" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       L9637D (center-left)
  ════════════════════════════════════════ -->
  <rect x="210" y="220" width="130" height="110" rx="6" fill="#1a1d27" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="275" y="238" fill="#00d4ff" font-size="9" font-weight="bold" text-anchor="middle">L9637D</text>
  <text x="275" y="250" fill="#6b7280" font-size="8" text-anchor="middle">K-Line Driver</text>

  <text x="220" y="268" fill="#e0e6f0" font-size="8">TxD ← GPIO17</text>
  <text x="220" y="281" fill="#e0e6f0" font-size="8">RxD → GPIO16</text>
  <text x="220" y="294" fill="#ffd700" font-size="8">VS  ← 5V (pin7+8)</text>
  <text x="220" y="307" fill="#ffd700" font-size="8">EN  ← 5V (pin3)</text>
  <text x="220" y="320" fill="#6b7280" font-size="8">GND ← GND (pin1+4)</text>
  <text x="220" y="325" fill="#00d4ff" font-size="7">K   ↔ OBD Pin7</text>

  <!-- OBD K-Line wire to L9637D -->
  <line x1="35" y1="149" x2="140" y2="149" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="140" y1="149" x2="140" y2="320" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="140" y1="320" x2="210" y2="320" stroke="#00d4ff" stroke-width="1.5"/>

  <!-- LM2596 5V to L9637D -->
  <line x1="130" y1="318" x2="160" y2="318" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="160" y1="294" x2="210" y2="294" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="160" y1="294" x2="160" y2="318" stroke="#ffd700" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       ESP32 (center)
  ════════════════════════════════════════ -->
  <rect x="420" y="60" width="160" height="560" rx="8" fill="#1a1d27" stroke="#00d4ff" stroke-width="2"/>
  <text x="500" y="80" fill="#00d4ff" font-size="11" font-weight="bold" text-anchor="middle">ESP32</text>
  <text x="500" y="94" fill="#6b7280" font-size="8" text-anchor="middle">NodeMCU 38-pin</text>
  <text x="500" y="106" fill="#6b7280" font-size="7" text-anchor="middle">D0WD-V3 · 240MHz · 4MB</text>

  <!-- Left pins -->
  <text x="428" y="130" fill="#ffd700" font-size="7.5">VIN ←5V</text>
  <text x="428" y="145" fill="#6b7280" font-size="7.5">GND</text>
  <text x="428" y="160" fill="#6b7280" font-size="7.5">GND</text>
  <text x="428" y="175" fill="#e0e6f0" font-size="7.5">D4  CAN TX</text>
  <text x="428" y="190" fill="#e0e6f0" font-size="7.5">D5  CAN RX</text>
  <text x="428" y="205" fill="#e0e6f0" font-size="7.5">D12 ENC CLK</text>
  <text x="428" y="220" fill="#e0e6f0" font-size="7.5">D13 ENC DT</text>
  <text x="428" y="235" fill="#e0e6f0" font-size="7.5">D14 BTN PROTO</text>
  <text x="428" y="250" fill="#e0e6f0" font-size="7.5">D25 BTN UP</text>
  <text x="428" y="265" fill="#e0e6f0" font-size="7.5">D26 BTN DOWN</text>
  <text x="428" y="280" fill="#e0e6f0" font-size="7.5">D27 BTN SEL</text>
  <text x="428" y="295" fill="#e0e6f0" font-size="7.5">D32 BTN PREV</text>
  <text x="428" y="310" fill="#e0e6f0" font-size="7.5">D33 BTN NEXT</text>
  <text x="428" y="325" fill="#6b7280" font-size="7.5">D34 DIP bit0</text>
  <text x="428" y="340" fill="#6b7280" font-size="7.5">D35 DIP bit1</text>
  <text x="428" y="355" fill="#6b7280" font-size="7.5">D36 DIP bit2</text>

  <!-- Right pins -->
  <text x="510" y="130" fill="#ff4466" font-size="7.5">3V3 →</text>
  <text x="510" y="145" fill="#6b7280" font-size="7.5">GND</text>
  <text x="510" y="160" fill="#e0e6f0" font-size="7.5">D15 ENC SW</text>
  <text x="510" y="175" fill="#00ff88" font-size="7.5">D2  LED Azul</text>
  <text x="510" y="190" fill="#e0e6f0" font-size="7.5">D16 KLINE RX</text>
  <text x="510" y="205" fill="#e0e6f0" font-size="7.5">D17 KLINE TX</text>
  <text x="510" y="220" fill="#00ff88" font-size="7.5">D18 LED Amarelo</text>
  <text x="510" y="235" fill="#00ff88" font-size="7.5">D19 LED Verde</text>
  <text x="510" y="250" fill="#e0e6f0" font-size="7.5">D21 OLED SDA</text>
  <text x="510" y="265" fill="#e0e6f0" font-size="7.5">D22 OLED SCL</text>
  <text x="510" y="280" fill="#00ff88" font-size="7.5">D23 LED Verm.</text>
  <text x="510" y="295" fill="#6b7280" font-size="7.5">TX0 USB debug</text>
  <text x="510" y="310" fill="#6b7280" font-size="7.5">RX0 USB debug</text>

  <!-- ESP32 → SN65HVD230 wires -->
  <line x1="420" y1="174" x2="370" y2="174" stroke="#e0e6f0" stroke-width="1"/>
  <line x1="370" y1="108" x2="370" y2="174" stroke="#e0e6f0" stroke-width="1"/>
  <line x1="340" y1="108" x2="370" y2="108" stroke="#e0e6f0" stroke-width="1"/>
