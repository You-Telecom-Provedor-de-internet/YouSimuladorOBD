  <text x="710" y="228" fill="#ff4466" font-size="8">+ (VCC) ← 3V3 ⚠</text>
  <text x="710" y="241" fill="#6b7280" font-size="8">GND ← GND</text>
  <text x="710" y="254" fill="#ffa500" font-size="8">CLK ← GPIO12</text>
  <text x="710" y="267" fill="#9370db" font-size="8">DT  ← GPIO13</text>
  <text x="710" y="280" fill="#ffd700" font-size="8">SW  ← GPIO15</text>

