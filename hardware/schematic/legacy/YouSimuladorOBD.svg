  <!-- ════════════════════════════════════════
       DIP SWITCH (bottom-left)
  ════════════════════════════════════════ -->
  <rect x="20" y="380" width="160" height="100" rx="6" fill="#1a1d27" stroke="#6b7280" stroke-width="1.5"/>
  <text x="100" y="398" fill="#e0e6f0" font-size="9" font-weight="bold" text-anchor="middle">DIP Switch 3 pos.</text>
  <text x="100" y="410" fill="#6b7280" font-size="7.5" text-anchor="middle">GPIO 34,35,36 — só entrada!</text>
  <text x="28" y="426" fill="#e0e6f0" font-size="7.5">bit0 GPIO34 ─[10kΩ]─ 3V3</text>
  <text x="28" y="439" fill="#e0e6f0" font-size="7.5">bit1 GPIO35 ─[10kΩ]─ 3V3</text>
  <text x="28" y="452" fill="#e0e6f0" font-size="7.5">bit2 GPIO36 ─[10kΩ]─ 3V3</text>
