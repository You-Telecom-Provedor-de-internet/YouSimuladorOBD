<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .bg { fill:#0f1117; }
      .card { fill:#1a1d27; stroke:#2a2d3a; stroke-width:2; rx:20; }
      .accent { fill:#00d4ff; }
      .ok { fill:#00ff88; }
      .warn { fill:#ffd166; }
      .text { fill:#e0e6f0; font-family:Segoe UI, Arial, sans-serif; }
      .muted { fill:#8b93a7; font-family:Segoe UI, Arial, sans-serif; }
      .arrow { stroke:#00d4ff; stroke-width:4; fill:none; marker-end:url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="560"/>
  <text x="60" y="70" class="text" font-size="34" font-weight="700">Rotação de senha da API</text>
  <text x="60" y="108" class="muted" font-size="20">Fluxo recomendado de campo para gerar, copiar e propagar a nova credencial.</text>

  <rect x="60" y="150" width="240" height="140" class="card"/>
  <text x="90" y="195" class="accent" font-size="20" font-weight="700">1. Abrir /ota.html</text>
  <text x="90" y="230" class="text" font-size="18">Entrar em</text>
  <text x="90" y="258" class="text" font-size="18">Configuração de Campo</text>
  <text x="90" y="286" class="muted" font-size="16">Botão: Rotacionar senha da API</text>

  <rect x="360" y="150" width="240" height="140" class="card"/>
  <text x="390" y="195" class="accent" font-size="20" font-weight="700">2. Confirmar rotação</text>
  <text x="390" y="230" class="text" font-size="18">A WebUI chama</text>
  <text x="390" y="258" class="text" font-size="18">POST /api/device/rotate-api-auth</text>
  <text x="390" y="286" class="muted" font-size="16">Sem reboot do ESP32</text>

  <rect x="660" y="150" width="240" height="140" class="card"/>
  <text x="690" y="195" class="accent" font-size="20" font-weight="700">3. Copiar a senha</text>
  <text x="690" y="230" class="text" font-size="18">A tela mostra a nova senha</text>
  <text x="690" y="258" class="text" font-size="18">uma única vez</text>
  <text x="690" y="286" class="warn" font-size="16" font-weight="700">Guarde antes de sair</text>

  <rect x="960" y="150" width="180" height="140" class="card"/>
  <text x="990" y="195" class="accent" font-size="20" font-weight="700">4. Testar</text>
  <text x="990" y="230" class="text" font-size="18">Validar</text>
  <text x="990" y="258" class="text" font-size="18">GET /api/status</text>
  <text x="990" y="286" class="ok" font-size="16" font-weight="700">HTTP 200</text>

  <path d="M300 220 H360" class="arrow"/>
  <path d="M600 220 H660" class="arrow"/>
  <path d="M900 220 H960" class="arrow"/>

  <rect x="180" y="360" width="360" height="120" class="card"/>
  <text x="210" y="402" class="accent" font-size="20" font-weight="700">Plugin / automação local</text>
  <text x="210" y="438" class="text" font-size="18">Atualize o arquivo:</text>
  <text x="210" y="466" class="text" font-size="18">scripts/local-api-credentials.json</text>

  <rect x="660" y="360" width="420" height="120" class="card"/>
  <text x="690" y="402" class="accent" font-size="20" font-weight="700">Conteúdo esperado</text>
  <text x="690" y="438" class="text" font-size="18">{ "user": "youapi", "password": "nova-senha" }</text>
  <text x="690" y="466" class="muted" font-size="16">O arquivo fica fora do Git e é lido automaticamente pelo plugin.</text>

  <path d="M540 420 H660" class="arrow"/>
</svg>
