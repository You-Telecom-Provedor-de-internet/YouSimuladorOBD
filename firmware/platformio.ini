[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Build ────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    -std=gnu++17
    -I include
    -I src
    -I src/obd
    -I src/protocols
    -I src/simulation
    -I src/web
    -I src/bluetooth
build_unflags = -std=gnu++11

; ── Upload / Monitor ─────────────────────────────────────────
upload_port     = COM3
monitor_port    = COM3
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed    = 921600

; ── Partição: reserva 1MB para LittleFS (arquivos web) ──────
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

; ── Dependências ─────────────────────────────────────────────
lib_deps =
    ; Web server assíncrono + WebSocket (não bloqueia TWAI/UART)
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0

    ; JSON — API REST e WebSocket
    bblanchon/ArduinoJson @ ^7.3.0

    ; Display OLED SH1107 128x128 (I2C)
    adafruit/Adafruit SH110X @ ^2.1.8
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.17.0

    ; Encoder rotativo KY-040
    madhephaestus/ESP32Encoder @ ^0.10.1

    ; Debounce para botões tácteis
    thomasfredericks/Bounce2 @ ^2.71

    ; ── Nativos ESP32 (sem dep. extra) ────────────────────────
    ; NVS — persistência Wi-Fi e config
    ; TWAI — CAN nativo (ESP-IDF)
    ; LittleFS — filesystem para WebUI
    ; mDNS — obdsim.local
    ; BluetoothSerial — SPP para emulação ELM327
