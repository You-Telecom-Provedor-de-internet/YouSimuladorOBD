[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Build ────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -std=gnu++17
    -I include
    -I src
    -I src/obd
    -I src/protocols
    -I src/simulation
    -I src/web
build_unflags = -std=gnu++11

; ── Upload / Monitor ─────────────────────────────────────────
upload_port     = COM3
monitor_port    = COM3
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed    = 921600

; ── Partição: reserva 1MB para LittleFS (arquivos web) ──────
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs

; ── Dependências ─────────────────────────────────────────────
lib_deps =
    ; Web server assíncrono + WebSocket (não bloqueia TWAI/UART)
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0

    ; JSON — API REST e WebSocket
    bblanchon/ArduinoJson @ ^7.3.0

    ; Display OLED SSD1306 128x64 (I2C)
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.17.0

    ; Encoder rotativo KY-040
    madhephaestus/ESP32Encoder @ ^0.10.1

    ; Debounce para botões tácteis
    thomasfredericks/Bounce2 @ ^2.71

    ; NVS (persistência Wi-Fi e config) — nativo ESP32, sem dep. extra
    ; TWAI (CAN nativo) — nativo ESP-IDF, sem dep. extra
    ; LittleFS — nativo arduino-esp32, sem dep. extra
    ; mDNS (obdsim.local) — nativo arduino-esp32, sem dep. extra
